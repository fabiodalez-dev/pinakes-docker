<VirtualHost *:80>
    ServerName localhost

    # Clean docroot = the app's public/ dir. The Slim front controller and the
    # shipped public/.htaccess (mod_rewrite) handle all routing.
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        # Pinakes relies on its .htaccess (rewrite rules, security headers).
        AllowOverride All
        Require all granted
    </Directory>

    # Never serve the application internals (defence in depth; the app dir is
    # outside DocumentRoot already, this blocks symlink/alias surprises).
    <DirectoryMatch "^/var/www/html/(app|config|installer|storage|vendor|cron|bin)">
        Require all denied
    </DirectoryMatch>

    # Honour reverse-proxy TLS termination so FORCE_HTTPS / secure cookies work.
    SetEnvIf X-Forwarded-Proto "https" HTTPS=on

    # Wizard fallback (no ADMIN_EMAIL/ADMIN_PASSWORD): until the install is
    # completed, send every request to the web wizard. The app's own redirect
    # (public/index.php) only fires when BOTH .env and .installed are missing,
    # and on Docker the entrypoint always pre-writes .env — so without this
    # rule a wizard-mode install lands on an empty app instead of the wizard.
    # Vhost-context rewrites run before the app's .htaccess; the rule
    # evaporates the moment the wizard writes the .installed lock (no restart
    # needed) and never fires on an installed instance.
    # /assets is excluded too: the wizard pulls /assets/vendor.css and
    # /assets/brand/logo.png from the app tree. The duplicated rule keeps the
    # https scheme when a TLS-terminating proxy is in front (mod_rewrite would
    # otherwise build an http:// Location from the plain backend connection).
    RewriteEngine On
    RewriteCond /var/www/html/.installed !-f
    RewriteCond %{REQUEST_URI} !^/(installer|assets)(/|$)
    RewriteCond %{REQUEST_URI} !^/favicon\.ico$
    RewriteCond %{HTTP:X-Forwarded-Proto} =https
    RewriteRule ^ https://%{HTTP_HOST}/installer/ [R=302,L]

    RewriteCond /var/www/html/.installed !-f
    RewriteCond %{REQUEST_URI} !^/(installer|assets)(/|$)
    RewriteCond %{REQUEST_URI} !^/favicon\.ico$
    RewriteRule ^ /installer/ [R=302,L]

    LogLevel warn
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
