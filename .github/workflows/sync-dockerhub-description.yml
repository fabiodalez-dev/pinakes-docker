name: Sync Docker Hub description

# Keeps the Docker Hub repository overview + short description in sync with
# README.md. Runs on every push that touches the README (so the Hub page never
# drifts from the repo) and on manual dispatch (to apply it immediately without
# rebuilding the image).
on:
  push:
    branches: [main]
    paths:
      - README.md
      - .github/workflows/sync-dockerhub-description.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Push README to Docker Hub
    runs-on: ubuntu-latest
    # Skip gracefully on forks / when the Docker Hub secrets aren't configured.
    if: ${{ github.repository == 'fabiodalez-dev/pinakes-docker' }}
    steps:
      - uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: fabiodalez/pinakes
          short-description: "Self-hosted Integrated Library System (ILS) — Apache + PHP 8.2 in one container, headless install, auto-tracks upstream releases."
          readme-filepath: ./README.md
